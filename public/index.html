<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft AFK Bot Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-anim"></div>
    <div class="app-container">
        <header class="glass-panel">
            <div class="title-area">
                <div class="logo">🧊</div>
                <h1>AFK Bot Dashboard</h1>
            </div>
            <div class="status-indicator">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </div>
        </header>

        <main class="main-content">
            <section class="card glass-panel config-panel">
                <h2>Connection Setup</h2>
                
                <div class="input-group">
                    <label>Server IP</label>
                    <input type="text" id="hostInput" placeholder="play.example.com">
                </div>
                <div class="input-group">
                    <label>Port</label>
                    <input type="number" id="portInput" placeholder="25565" value="25565">
                </div>
                <div class="input-group">
                    <label>Bot Username</label>
                    <input type="text" id="usernameInput" placeholder="AFK_Farmer">
                </div>
                <div class="input-group">
                    <label>Minecraft Version</label>
                    <input type="text" id="versionInput" placeholder="Leave empty for Auto (e.g. 1.20.4)">
                </div>
                <div class="input-group">
                    <label>Auth Type</label>
                    <select id="authInput">
                        <option value="offline">Offline (Cracked)</option>
                        <option value="microsoft">Microsoft (Premium)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>On-Join Command</label>
                    <input type="text" id="onJoinCommandInput" placeholder="/login p@ssword">
                </div>
                
                <div class="button-group">
                    <button class="btn btn-primary" id="startBtn">Connect Bot</button>
                    <button class="btn btn-danger" id="stopBtn" disabled>Disconnect</button>
                    <div class="divider"></div>
                    <label>Quick Actions</label>
                    <button class="btn btn-secondary" onclick="sendQuickCommand('/tpaccept')">Accept TP (/tpaccept)</button>
                    <button class="btn btn-secondary" onclick="sendQuickCommand('/hub')">Go to Hub (/hub)</button>
                </div>
            </section>

            <section class="card glass-panel console-panel">
                <h2>Live Console & Chat</h2>
                <div class="logs-container" id="logsContainer">
                    <div class="log-entry system">System initialized. Waiting for connection...</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type a message or command (e.g. /spawn)">
                    <button class="btn btn-primary" id="sendChatBtn">Send</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Official Copyright and Dev Credit -->
    <footer style="text-align: center; padding: 20px; margin-top: auto; color: rgba(255, 255, 255, 0.6); font-family: 'Inter', sans-serif; font-size: 0.85rem; letter-spacing: 0.5px;">
        &copy; 2026 All Rights Reserved | Privacy Policy | Dev: <span style="color: #64b5f6; font-weight: 600;">errorexe</span>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
